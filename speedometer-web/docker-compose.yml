services:
  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    environment:
      - PUBLIC_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    environment:
      GEOCODER_PROVIDER: ${GEOCODER_PROVIDER:-nominatim}
      GEOCODER_USER_AGENT: ${GEOCODER_USER_AGENT:-DashTrail/1.0-self-hosted-your-domain}
      GEOCODER_LANGUAGE: ${GEOCODER_LANGUAGE:-en}
    volumes:
      - speedo_data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  speedo_data:
  caddy_data:
  caddy_config:
